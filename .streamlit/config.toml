[theme]
# Explicit colours — prevents white-on-white on Windows / dark-mode browsers
primaryColor        = "#0066cc"
backgroundColor     = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor           = "#262730"
font                = "sans serif"

[server]
headless            = true
port                = 8501
enableCORS          = false
enableXsrfProtection = true

[browser]
gatherUsageStats    = false
serverAddress       = "localhost"
